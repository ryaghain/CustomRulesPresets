[config]
schemaVersion = "0.0.1"

[general]
repository = "https://thunderstore.io"

[package]
namespace = "ryaghain"
name = "CustomRulesPresets"
description = "Adds the ability to create, save, and load custom rules presets."
websiteUrl = "https://github.com/ryaghain/CustomRulesPresets"
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack = "5.4.2304"

[build]
icon = "../../icon.png"
readme = "../../README.md"
outdir = "../../artifacts/thunderstore/"

[[build.copy]]
source = "../../artifacts/bin/CustomRulesPresets/release/com.github.ryaghain.CustomRulesPresets.dll"
target = "plugins/"

[[build.copy]]
source = "../../CHANGELOG.md"
target = "/"

[[build.copy]]
source = "../../LICENSE"
target = "/"

# The following config options only apply when using TCLI to publish to Thunderstore directly:

[publish]
# See communities at:
# https://thunderstore.io/api/experimental/community/
communities = [ "super-battle-golf", ]

[publish.categories]
# See categories at:
# https://thunderstore.io/api/experimental/community/super-battle-golf/category/
super-battle-golf = [ "mods", ]
